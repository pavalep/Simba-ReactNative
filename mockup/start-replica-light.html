<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simba Start Replica (Light)</title>
  <link rel="stylesheet" href="start-replica.css" />
</head>
<body>
  <div class="phone theme-light">
    <div class="bg"></div>
    <div class="content">
      <div class="status">
        <div class="time">9:41</div>
        <div class="icons">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="8" width="3" height="4" rx="0.8" fill="#111" opacity="0.65" />
            <rect x="4.5" y="6" width="3" height="6" rx="0.8" fill="#111" opacity="0.65" />
            <rect x="9" y="4" width="3" height="8" rx="0.8" fill="#111" opacity="0.65" />
            <rect x="13.5" y="2" width="3" height="10" rx="0.8" fill="#111" opacity="0.5" />
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 10.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z" fill="#111" opacity="0.6" />
            <path d="M4.7 9.8A4.8 4.8 0 0 1 8 8.5c1.3 0 2.5.5 3.3 1.3" stroke="#111" stroke-width="0.9" opacity="0.5" stroke-linecap="round" />
            <path d="M2.4 7.7A8 8 0 0 1 8 5.5c2.2 0 4.2.9 5.6 2.2" stroke="#111" stroke-width="0.9" opacity="0.35" stroke-linecap="round" />
          </svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.6" y="0.6" width="20.4" height="10.8" rx="2" stroke="#111" stroke-opacity="0.35" stroke-width="0.9" />
            <rect x="2.2" y="2.2" width="16.8" height="7.6" rx="1.5" fill="#111" fill-opacity="0.65" />
            <rect x="22.1" y="3.4" width="1.7" height="5.2" rx="0.85" fill="#111" fill-opacity="0.3" />
          </svg>
        </div>
      </div>

      <div class="topbar">
        <div class="brand">
          <img class="lion" src="../src/assets/images/icons/ui_lion_gold.png" alt="Lion" />
          <div class="name">
            <span>SIMBA</span>
            <span class="divider"></span>
            <span class="tag">Play anything.</span>
          </div>
        </div>
        <img class="bell" src="../src/assets/images/icons/ui_bell_gray.png" alt="Notifications" />
      </div>

      <h1 class="title">Good evening</h1>
      <p class="subtitle">Play what moves you.</p>

      <div class="cta">
        <img class="folder" src="../src/assets/images/icons/ui_folder_black.png" alt="Folder" />
        <span class="label">Open Media</span>
      </div>

      <div class="section-row">
        <div class="section-title">Continue Watching</div>
      </div>

      <div class="continue">
        <div class="poster">
          <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=cinematic%20astronaut%20in%20spacesuit%20close%20up%2C%20science%20fiction%2C%20realistic%2C%20dramatic%20lighting%2C%20high%20detail&image_size=square" alt="Interstellar" />
        </div>
        <div class="cw-mid">
          <p class="cw-title">Interstellar</p>
          <p class="cw-sub">01:15:34 remaining</p>
          <div class="progress"><div class="fill"></div></div>
        </div>
        <div class="playbtn" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M10 8.5v7l6-3.5-6-3.5Z" fill="#111" opacity="0.8" />
          </svg>
        </div>
      </div>

      <div class="section-row">
        <div class="section-title">Recent</div>
      </div>

      <div class="recent-grid">
        <div class="tile">
          <div class="thumb">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=dark%20dramatic%20silhouette%20of%20a%20bat%20over%20city%20skyline%20at%20night%2C%20cinematic%2C%20realistic%2C%20high%20contrast&image_size=square" alt="The Dark Knight" />
            <div class="overlay"></div>
            <div class="mini">
              <svg viewBox="0 0 24 24" fill="none"><path d="M10 8.5v7l6-3.5-6-3.5Z" fill="white" opacity="0.9"/></svg>
            </div>
          </div>
          <p class="t-title">The Dark Knight</p>
          <p class="t-meta">Movie • 2h 32m</p>
        </div>
        <div class="tile">
          <div class="thumb">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=lone%20person%20standing%20on%20cliff%20overlooking%20ocean%20at%20sunset%2C%20cinematic%20landscape%2C%20realistic&image_size=square" alt="Inception" />
            <div class="overlay"></div>
            <div class="mini">
              <svg viewBox="0 0 24 24" fill="none"><path d="M10 8.5v7l6-3.5-6-3.5Z" fill="white" opacity="0.9"/></svg>
            </div>
          </div>
          <p class="t-title">Inception</p>
          <p class="t-meta">Movie • 2h 28m</p>
        </div>
        <div class="tile">
          <div class="thumb">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=snowy%20mountains%20reflected%20in%20lake%20at%20dawn%2C%20cinematic%2C%20realistic%2C%20ultra%20detail&image_size=square" alt="Mountains" />
            <div class="overlay"></div>
            <div class="mini">
              <svg viewBox="0 0 24 24" fill="none"><path d="M10 8.5v7l6-3.5-6-3.5Z" fill="white" opacity="0.9"/></svg>
            </div>
          </div>
          <p class="t-title">Mountains</p>
          <p class="t-meta">Video • 4K</p>
        </div>
        <div class="tile">
          <div class="thumb">
            <img src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=concert%20crowd%20with%20stage%20lights%2C%20bokeh%2C%20cinematic%2C%20realistic&image_size=square" alt="Concert" />
            <div class="overlay"></div>
            <div class="mini">
              <svg viewBox="0 0 24 24" fill="none"><path d="M10 8.5v7l6-3.5-6-3.5Z" fill="white" opacity="0.9"/></svg>
            </div>
          </div>
          <p class="t-title">Concert</p>
          <p class="t-meta">Audio • 1h 28m</p>
        </div>
      </div>
    </div>

    <div class="tabbar" role="navigation">
      <a class="tab active" href="#">
        <img src="../src/assets/images/icons/ui_home_gold.png" alt="Home" />
        <span>Home</span>
      </a>
      <a class="tab" href="#">
        <img src="../src/assets/images/icons/ui_music_gray.png" alt="Music" />
        <span>Music</span>
      </a>
      <a class="tab" href="#">
        <img src="../src/assets/images/icons/ui_videos_gray.png" alt="Videos" />
        <span>Videos</span>
      </a>
      <a class="tab" href="#">
        <img src="../src/assets/images/icons/ui_settings_gray.png" alt="Settings" />
        <span>Settings</span>
      </a>
    </div>
    <div class="home-indicator"></div>
  </div>
</body>
</html>
